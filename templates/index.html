<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUKEBOXMAKERS</title>
    <link rel="stylesheet" href="/static/style.css?v=5">
</head>
<body>
    <header>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('trending')">trending --list</button>
            <button class="tab-btn" onclick="switchTab('search')">search --query</button>
        </div>
    </header>

    <main>
        <!-- Tab: Trending -->
        <div class="tab-content active" id="tabTrending">
            <div class="songs-grid" id="songsGrid">
                {% for song in songs %}
                <div class="song-card" style="{% if loop.index > 40 %}display:none{% endif %}" data-index="{{ loop.index }}" ondblclick="playSong(event, '{{ song.title | e }}', '{{ song.artist | e }}')">
                    <div class="song-rank">{{ '%03d' | format(loop.index) }}</div>
                    <div class="song-info">
                        <div class="song-title">{{ song.title }}</div>
                        <div class="song-artist">{{ song.artist }}</div>
                    </div>
                    <div class="song-links">
                        <button class="link-btn play" title="Play" onclick="playSong(event, '{{ song.title | e }}', '{{ song.artist | e }}')"></button>
                        <button class="link-btn download" title="Download" onclick="downloadSong(event, '{{ song.title | e }}', '{{ song.artist | e }}')"></button>
                    </div>
                </div>
                {% endfor %}

                {% if not songs %}
                <div class="empty-state">
                    <p>loading sounds...</p>
                    <p>first scan may take a few minutes.</p>
                    <button class="btn-refresh" onclick="location.reload()">[RELOAD]</button>
                </div>
                {% endif %}
            </div>

            {% if songs | length > 40 %}
            <div class="show-more-container" id="showMoreContainer">
                <button class="btn-show-more" id="btnShowMore" onclick="showMore()">[LOAD_MORE]</button>
                <span class="show-more-count" id="showMoreCount">40/{{ songs | length }}</span>
            </div>
            {% endif %}
        </div>

        <!-- Tab: Search -->
        <div class="tab-content" id="tabSearch">
            <div class="search-container">
                <div class="search-bar">
                    <span class="search-prompt">&gt;_</span>
                    <input type="text" id="searchInput" placeholder="search..." autocomplete="off">
                    <button class="search-btn" id="searchBtn" onclick="searchSongs()">[ENTER]</button>
                </div>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </main>

    <div class="player-bar" id="playerBar">
        <div class="player-info">
            <div class="player-text">
                <span id="playerTitle">---</span>
                <span id="playerArtist"></span>
            </div>
            <button class="player-close" onclick="closePlayer()">[X]</button>
        </div>
        <audio id="playerAudio" controls autoplay></audio>
    </div>

    <script src="/static/script.js?v=5"></script>
</body>
</html>
