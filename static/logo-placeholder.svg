<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" fill="#000"/>
  <g transform="translate(50,50)">
    <!-- Play triangle shape as clip -->
    <defs>
      <clipPath id="playClip">
        <path d="M-18,-22 L22,0 L-18,22 Z"/>
      </clipPath>
    </defs>
    <!-- White play button with basketball lines -->
    <path d="M-18,-22 L22,0 L-18,22 Z" fill="#fff"/>
    <!-- Basketball curved lines -->
    <g clip-path="url(#playClip)">
      <!-- Horizontal arc -->
      <path d="M-22,-8 Q0,-18 22,-4" stroke="#000" stroke-width="2.5" fill="none"/>
      <!-- Lower horizontal arc -->
      <path d="M-22,12 Q0,2 22,8" stroke="#000" stroke-width="2.5" fill="none"/>
      <!-- Vertical arc left -->
      <path d="M-6,-24 Q-14,0 -6,24" stroke="#000" stroke-width="2.5" fill="none"/>
      <!-- Vertical arc right -->
      <path d="M8,-24 Q16,0 8,24" stroke="#000" stroke-width="2.5" fill="none"/>
    </g>
  </g>
</svg>
